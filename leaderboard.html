<h2 id="title"></h2>
<div id="leaderboard"></div>

<script>
const params = new URLSearchParams(window.location.search);
const setNo = params.get("set") || "1";

const currentTestName = `Mathematics Mock Test ${setNo}`;
document.getElementById("title").innerText = currentTestName;

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQvxJWMg0KPIRZCA8nK3tiHoz3xF62mB11gFCbFW4hyhXiOpHozfLYjD45FG-SgWR4dL0gKTe9WW-mk/pub?gid=0&single=true&output=csv")
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").slice(1); // skip header

    const filtered = rows
      .map(r => r.split(","))
      .filter(r => r[2] === currentTestName); // filter by test

    // sort by score DESC
    filtered.sort((a, b) => b[1] - a[1]);

    let html = "<ol>";
    filtered.slice(0, 10).forEach(row => {
      html += `<li>${row[0]} - ${row[1]}</li>`;
    });
    html += "</ol>";

    document.getElementById("leaderboard").innerHTML = html;
  });
</script>
