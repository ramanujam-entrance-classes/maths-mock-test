<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Leaderboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  margin: 0;
  padding: 20px;
}

.leaderboard-container {
  max-width: 600px;
  margin: auto;
  text-align: center;
}

/* TITLE */
.title {
  margin-bottom: 5px;
  color: #2c3e50;
}

/* SUB TITLE (TEST NAME) */
.subtitle {
  margin-bottom: 15px;
  color: #555;
  font-size: 15px;
}

/* BUTTON */
.refresh-btn {
  background: #3498db;
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 20px;
  font-weight: bold;
}

.refresh-btn:hover {
  background: #217dbb;
}

/* CARD */
.card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: white;
  margin: 10px 0;
  padding: 12px 15px;
  border-radius: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.02);
}

.rank {
  font-size: 18px;
  font-weight: bold;
  width: 50px;
}

.name {
  flex: 1;
  text-align: left;
  font-weight: bold;
}

.score {
  font-weight: bold;
  color: #2c3e50;
}

/* TOP 3 */
.gold { background: linear-gradient(90deg, #fff3b0, #ffd700); }
.silver { background: linear-gradient(90deg, #f0f0f0, #c0c0c0); }
.bronze { background: linear-gradient(90deg, #f7d7b5, #cd7f32); }

@media (max-width: 600px) {
  .card { font-size: 14px; }
}
</style>
</head>

<body>

<div class="leaderboard-container">

  <!-- 🏆 MAIN TITLE -->
  <h2 class="title">🏆 Leaderboard</h2>

  <!-- 📌 SUB TITLE (TEST NAME) -->
  <div id="testName" class="subtitle"></div>

  <button onclick="loadLeaderboard()" class="refresh-btn">
    🔄 Refresh
  </button>

  <div id="leaderboard"></div>

</div>

<script>
const SHEET_URL = "YOUR_GOOGLE_SHEET_CSV_URL";

/* =========================
   📌 GET SET NUMBER
========================= */
const params = new URLSearchParams(window.location.search);
const setNo = params.get("set");

/* 📌 FULL TEST NAME */
const currentTestName = setNo 
  ? `Mathematics Mock Test ${setNo}` 
  : "Unknown Test";

/* show subtitle */
document.getElementById("testName").innerText = currentTestName;

/* =========================
   🚀 LOAD LEADERBOARD
========================= */
function loadLeaderboard() {
  fetch(SHEET_URL + "&t=" + new Date().getTime())
    .then(res => res.text())
    .then(data => {

      const rows = data.split("\n").slice(1);

      let filtered = rows
        .map(r => r.split(","))
        .filter(r => (r[2] || "").trim() === currentTestName);

      filtered.sort((a, b) => b[1] - a[1]);

      let html = "";

      filtered.slice(0, 20).forEach((row, index) => {

        let rankIcon = index + 1;
        let rankClass = "";

        if (index === 0) {
          rankIcon = "🥇";
          rankClass = "gold";
        } 
        else if (index === 1) {
          rankIcon = "🥈";
          rankClass = "silver";
        } 
        else if (index === 2) {
          rankIcon = "🥉";
          rankClass = "bronze";
        }

        html += `
          <div class="card ${rankClass}">
            <div class="rank">${rankIcon}</div>
            <div class="name">${row[0]}</div>
            <div class="score">${row[1]}</div>
          </div>
        `;
      });

      document.getElementById("leaderboard").innerHTML = html;
    });
}

window.onload = loadLeaderboard;
</script>

</body>
</html>
