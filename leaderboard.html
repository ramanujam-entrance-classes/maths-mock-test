<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Leaderboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  margin: 0;
  padding: 20px;
}

.leaderboard-container {
  max-width: 600px;
  margin: auto;
  text-align: center;
}

/* TITLE */
.title {
  margin-bottom: 5px;
  color: #2c3e50;
}

/* SUB TITLE (TEST NAME) */
.subtitle {
  margin-bottom: 15px;
  color: #555;
  font-size: 15px;
}

/* BUTTON */
.refresh-btn {
  background: #3498db;
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 20px;
  font-weight: bold;
}

.refresh-btn:hover {
  background: #217dbb;
}

/* CARD */
.card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: white;
  margin: 10px 0;
  padding: 12px 15px;
  border-radius: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.02);
}

.rank {
  font-size: 18px;
  font-weight: bold;
  width: 50px;
}

.name {
  flex: 1;
  text-align: left;
  font-weight: bold;
}

.score {
  font-weight: bold;
  color: #2c3e50;
}

  .test-name {
  display: inline-block;
  font-size: 18px;
  font-weight: 700;
  padding: 8px 18px;
  border-radius: 25px;
  color: white;
  background: linear-gradient(135deg, #4f46e5, #06b6d4);
  box-shadow: 0 6px 15px rgba(79, 70, 229, 0.3);
  letter-spacing: 0.5px;
  margin-top: 8px;
}
  
/* TOP 3 */
.card.gold {
  background: linear-gradient(135deg, #fff7cc, #ffd700);
  border-left: 6px solid #f1c40f;
  box-shadow: 0 8px 20px rgba(255, 215, 0, 0.25);
  transform: scale(1.02);
}

.card.silver {
  background: linear-gradient(135deg, #f5f7fa, #c0c0c0);
  border-left: 6px solid #a8a8a8;
  box-shadow: 0 8px 20px rgba(160, 160, 160, 0.25);
  transform: scale(1.01);
}

.card.bronze {
  background: linear-gradient(135deg, #ffe0c2, #cd7f32);
  border-left: 6px solid #b87333;
  box-shadow: 0 8px 20px rgba(205, 127, 50, 0.25);
  transform: scale(1.01);
}

.card.gold:hover,
.card.silver:hover,
.card.bronze:hover {
  transform: scale(1.05);
  transition: 0.2s ease;
}
  
@media (max-width: 600px) {
  .card { font-size: 14px; }
}

.card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 15px;
  margin: 10px 0;
  border-radius: 10px;
  background: white;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.rank {
  width: 40px;
  text-align: center;
  font-size: 18px;
}

.name {
  flex: 2;
  font-weight: 600;
}

/* 🔥 stacked score + time */
.score-block {
  flex: 1;
  text-align: right;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.score {
  font-weight: bold;
  color: #1f3c88;
  font-size: 16px;
  background: #eef3ff;
  padding: 4px 8px;
  border-radius: 6px;
  display: inline-block;
}

.timestamp {
  font-size: 12px;
  color: #777;
  margin-top: 2px;
}

/* 📱 mobile fix */
@media (max-width: 600px) {
  .card {
    padding: 10px;
  }

  .name {
    font-size: 13px;
  }

  .score {
    font-size: 14px;
  }

  .timestamp {
    font-size: 11px;
  }
}
</style>
</head>

<body>

<div class="leaderboard-container">

  <!-- 🏆 MAIN TITLE -->
  <h2 class="title">🏆 Leaderboard</h2>

  <!-- 📌 SUB TITLE (TEST NAME) -->
  <div id="testName" class="test-name"></div>
  <br><br>
  <button onclick="loadLeaderboard()" class="refresh-btn">
    🔄
  </button>

  <div id="leaderboard"></div>

</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1q1i6uIL9uuGI_UXBzNAGcgrdk_lRIm9AVJhkzW8fNR0/gviz/tq?tqx=out:json";

let leaderboardData = [];
let latestRequestId = 0;
  
/* =========================
   📌 GET SET NUMBER
========================= */
const params = new URLSearchParams(window.location.search);
const setNo = params.get("set");

/* 📌 FULL TEST NAME */
const currentTestName = setNo 
  ? `Mathematics Mock Test ${setNo}` 
  : "Unknown Test";

/* show subtitle */
document.getElementById("testName").innerText = currentTestName;

function parseSheet(text) {
  const json = JSON.parse(text.substring(47).slice(0, -2));

  return json.table.rows.map(r =>
    r.c.map(c => (c ? c.v : ""))
  );
}

function isToday(sheetValue) {
    if (!sheetValue) return false;

    let dateObj;

    // If it's an object from Google Sheets JSON
    if (typeof sheetValue === "object" && sheetValue.v) {
        sheetValue = sheetValue.v;
    }

    // Parse Google Sheets Date(...) string
    if (typeof sheetValue === "string" && sheetValue.startsWith("Date(")) {
        const match = sheetValue.match(/\d+/g); // extract all numbers
        if (!match || match.length < 3) return false;
        const year = Number(match[0]);
        const month = Number(match[1]); // 0-based
        const day = Number(match[2]);
        dateObj = new Date(year, month, day);
    } else {
        dateObj = new Date(sheetValue); // fallback
    }

    if (isNaN(dateObj)) return false;

    const today = new Date();
    return dateObj.getFullYear() === today.getFullYear() &&
           dateObj.getMonth() === today.getMonth() &&
           dateObj.getDate() === today.getDate();
}


  function formatTimeShort(val) {
  if (!val) return "-";

  // remove T- prefix if present
  val = val.toString().replace("T-", "");

  let [min, sec] = val.split(":");

  // fix missing seconds / single digit
  sec = (sec || "0").padStart(2, "0");

  return `${min}m ${sec}s`;
}

function formatDate(value) {
  if (!value) return "-";

  // If it's already a readable string
  if (typeof value === "string" && !value.includes("Date(")) {
    const d = new Date(value);
    return isNaN(d)
      ? value
      : d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  // If it's Google Sheets Date(...) format
  if (typeof value === "string" && value.includes("Date(")) {
    const match = value.match(/\d+/g);

    if (!match || match.length < 3) return "-";

    const year = Number(match[0]);
    const month = Number(match[1]);
    const day = Number(match[2]);
    const hour = Number(match[3] || 0);
    const min = Number(match[4] || 0);
    const sec = Number(match[5] || 0);

    const d = new Date(year, month, day, hour, min, sec);

    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
}
  
/* =========================
   🚀 LOAD LEADERBOARD
========================= */
function loadLeaderboard() {
    fetch(SHEET_URL + "&t=" + Date.now(), { cache: "no-store" })
        .then(res => res.text())
        .then(data => {
            const rows = parseSheet(data);
            console.log("TOTAL ROWS:", rows.length);
            leaderboardData = rows.filter(r => {
                const testNameMatch = (r[2] || "").toString().trim().toLowerCase() === currentTestName.trim().toLowerCase();
                const todayMatch = isToday(r[4]);
                return testNameMatch && todayMatch;
            });
            renderLeaderboard();
        });
}

function renderLeaderboard() {
  const TOTAL_MARKS = 600;
  const sorted = [...leaderboardData].sort((a, b) =>
    Number(b[1] || 0) - Number(a[1] || 0)
  );

  let html = "";

  sorted.forEach((row, index) => {

  let rankIcon = index + 1;
  if (index === 0) rankIcon = "🥇";
  else if (index === 1) rankIcon = "🥈";
  else if (index === 2) rankIcon = "🥉";

  let extraClass = "";
  if (index === 0) extraClass = "gold";
  else if (index === 1) extraClass = "silver";
  else if (index === 2) extraClass = "bronze";

   html += `
  <div class="card ${extraClass}">

    <div class="rank">${rankIcon}</div>

    <div class="col name">${row[0]}
    </div>

    <div class="col score-block">
      <div class="score">${row[1]}/${TOTAL_MARKS}</div>
      <div class="timestamp"> ⏱️${formatTimeShort(row[3])} <br> ${formatDate(row[4])}</div>
    </div>

  </div>
`;
     });
  document.getElementById("leaderboard").innerHTML =
    html || "<p>No data found</p>";
}

window.onload = loadLeaderboard;
</script>

</body>
</html>
