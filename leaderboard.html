<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Leaderboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  margin: 0;
  padding: 20px;
}

.leaderboard-container {
  max-width: 600px;
  margin: auto;
  text-align: center;
}

/* TITLE */
.title {
  margin-bottom: 5px;
  color: #2c3e50;
}

/* SUB TITLE (TEST NAME) */
.subtitle {
  margin-bottom: 15px;
  color: #555;
  font-size: 15px;
}

/* BUTTON */
.refresh-btn {
  background: #3498db;
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 20px;
  font-weight: bold;
}

.refresh-btn:hover {
  background: #217dbb;
}

/* CARD */
.card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: white;
  margin: 10px 0;
  padding: 12px 15px;
  border-radius: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.02);
}

.rank {
  font-size: 18px;
  font-weight: bold;
  width: 50px;
}

.name {
  flex: 1;
  text-align: left;
  font-weight: bold;
}

.score {
  font-weight: bold;
  color: #2c3e50;
}

  .test-name {
  display: inline-block;
  font-size: 18px;
  font-weight: 700;
  padding: 8px 18px;
  border-radius: 25px;
  color: white;
  background: linear-gradient(135deg, #4f46e5, #06b6d4);
  box-shadow: 0 6px 15px rgba(79, 70, 229, 0.3);
  letter-spacing: 0.5px;
  margin-top: 8px;
}
  
/* TOP 3 */
.gold { background: linear-gradient(90deg, #fff3b0, #ffd700); }
.silver { background: linear-gradient(90deg, #f0f0f0, #c0c0c0); }
.bronze { background: linear-gradient(90deg, #f7d7b5, #cd7f32); }

@media (max-width: 600px) {
  .card { font-size: 14px; }
}
</style>
</head>

<body>

<div class="leaderboard-container">

  <!-- 🏆 MAIN TITLE -->
  <h2 class="title">🏆 Leaderboard</h2>

  <!-- 📌 SUB TITLE (TEST NAME) -->
  <div id="testName" class="test-name"></div>

  <button onclick="loadLeaderboard()" class="refresh-btn">
    🔄 Refresh
  </button>

  <div id="leaderboard"></div>

</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvxJWMg0KPIRZCA8nK3tiHoz3xF62mB11gFCbFW4hyhXiOpHozfLYjD45FG-SgWR4dL0gKTe9WW-mk/pub?gid=0&single=true&output=csv";

/* =========================
   📌 GET SET NUMBER
========================= */
const params = new URLSearchParams(window.location.search);
const setNo = params.get("set");

/* 📌 FULL TEST NAME */
const currentTestName = setNo 
  ? `Mathematics Mock Test ${setNo}` 
  : "Unknown Test";

/* show subtitle */
document.getElementById("testName").innerText = currentTestName;

/* =========================
   🚀 LOAD LEADERBOARD
========================= */
function loadLeaderboard() {
  fetch(SHEET_URL + "&t=" + new Date().getTime())
    .then(res => res.text())
    .then(data => {

      console.log("RAW DATA:", data); // DEBUG

      const rows = data
        .split("\n")
        .slice(1)
        .map(r => r.split(","))
        .filter(r => r.length >= 3); // safety check

      console.log("ROWS:", rows); // DEBUG

      const filtered = rows.filter(r =>
        (r[2] || "").trim() === currentTestName.trim()
      );

      console.log("FILTERED:", filtered); // DEBUG

      filtered.sort((a, b) => Number(b[1]) - Number(a[1]));

      let html = "";

      if (filtered.length === 0) {
        document.getElementById("leaderboard").innerHTML =
          "<p style='color:gray'>No submissions yet for this test.</p>";
        return;
      }

      filtered.slice(0, 20).forEach((row, index) => {

        let rankIcon = index + 1;
        let rankClass = "";

        if (index === 0) rankIcon = "🥇";
        else if (index === 1) rankIcon = "🥈";
        else if (index === 2) rankIcon = "🥉";

        html += `
          <div class="card ${rankClass}">
            <div class="rank">${rankIcon}</div>
            <div class="name">${row[0]}</div>
            <div class="score">${row[1]}</div>
          </div>
        `;
      });

      document.getElementById("leaderboard").innerHTML = html;
    })
    .catch(err => {
      console.error("FETCH ERROR:", err);
      document.getElementById("leaderboard").innerHTML =
        "<p style='color:red'>Failed to load leaderboard</p>";
    });
}

window.onload = loadLeaderboard;
</script>

</body>
</html>
