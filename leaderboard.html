<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f4f7f6;
  margin: 0;
  padding: 15px;
}

.container {
  max-width: 700px;
  margin: auto;
}

.title {
  text-align: center;
  color: #0033cc;
  margin-bottom: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.rank {
  font-weight: bold;
  font-size: 18px;
  width: 40px;
}

.name {
  flex: 1;
  font-weight: 500;
}

.score {
  font-weight: bold;
  color: green;
}

.time {
  font-size: 12px;
  color: #666;
}

.top1 { background: #fff8dc; }
.top2 { background: #f0f0f0; }
.top3 { background: #ffe4e1; }

.footer {
  text-align: center;
  margin-top: 10px;
  font-size: 12px;
  color: #777;
}
</style>
</head>

<body>

<div class="container">
  <h2 class="title" id="title"></h2>
  <div id="leaderboard"></div>
  <div class="footer">Auto-refresh every 5 seconds ⟳</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const setNo = params.get("set") || "1";

const currentTestName = `Mathematics Mock Test ${setNo}`;
document.getElementById("title").innerText = currentTestName;

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvxJWMg0KPIRZCA8nK3tiHoz3xF62mB11gFCbFW4hyhXiOpHozfLYjD45FG-SgWR4dL0gKTe9WW-mk/pub?gid=0&single=true&output=csv"; // paste here

let isLoading = false;

function loadLeaderboard() {
  if (isLoading) return; // 🚨 block multiple calls

  isLoading = true;

  fetch(SHEET_URL + "&t=" + new Date().getTime())
    .then(res => res.text())
    .then(data => {

      const rows = data.split("\n").slice(1);

      let filtered = rows
        .map(r => r.split(","))
        .filter(r => r[2] === currentTestName);

      // Sort by score DESC
      filtered.sort((a, b) => {
        const scoreA = parseInt(a[1]);
        const scoreB = parseInt(b[1]);
      
        // 1. Sort by score (descending)
        if (scoreB !== scoreA) {
          return scoreB - scoreA;
        }
      
        // 2. Tie-breaker: lower time wins
        const timeA = a[3];
        const timeB = b[3];
      
        const [minA, secA] = timeA.split(":").map(Number);
        const [minB, secB] = timeB.split(":").map(Number);
      
        const totalA = minA * 60 + secA;
        const totalB = minB * 60 + secB;
      
        return totalA - totalB;
      });

      let html = "";

      filtered.slice(0, 20).forEach((row, index) => {
        html += `
          <div class="card">
            <div>${index + 1}</div>
            <div>${row[0]}</div>
            <div>${row[1]}</div>
          </div>
        `;
      });

      document.getElementById("leaderboard").innerHTML = html;
    })
    .finally(() => {
      isLoading = false;
    });
}
  
// Initial load
loadLeaderboard();

// Auto refresh every 5 sec
setInterval(loadLeaderboard, 10000);
</script>

</body>
</html>
